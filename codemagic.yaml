# ============================================================
# Codemagic CI/CD for Flutter iOS - Zerin Express Customer App
# ============================================================

workflows:
  ios-release:
    name: iOS Release Build (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.zerinexpress.app"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: 'release/*'
          include: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.pub-cache
        - ios/Pods

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA for App Store
        script: |
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/ios/debug-info

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/debug-info/**/*

    publishing:
      email:
        recipients:
          - dimanshilla255@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true

# ============================================================
# Notes:
# - Bundle ID: com.zerinexpress.app
# - Go to Codemagic UI → App settings → Code signing → Connect Apple Developer account (Recommended)
# - Go to App settings → Publishing → Apple App Store Connect → Upload your .p8 file
# ============================================================

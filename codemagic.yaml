# ============================================================
# Codemagic CI/CD for Flutter iOS - Zerin Express Customer App
# ============================================================
# 
# How to use:
# 1. Push this file to your repository (already done)
# 2. In Codemagic UI:
#    - Go to App settings → Code signing → Connect your Apple Developer account (Automatic signing - Recommended)
#    - Go to App settings → Publishing → Apple App Store Connect → Upload your .p8 file and add the key
# 3. Trigger a build using the "ios-release" workflow

workflows:
  ios-release:
    name: iOS Release Build (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.zerinexpress.app"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: 'release/*'
          include: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.pub-cache
        - ios/Pods

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA for App Store
        script: |
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/ios/debug-info

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/debug-info/**/*

    publishing:
      email:
        recipients:
          - dimanshilla255@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false     # Change to true only when ready for App Store review

# ============================================================
# Notes:
# - Bundle ID: com.zerinexpress.app
# - Recommended: Use Automatic code signing by connecting your Apple Developer account in Codemagic
# - Make sure you have created the App in App Store Connect with the same bundle ID
# - After successful build, the IPA will be automatically sent to TestFlight
# ============================================================

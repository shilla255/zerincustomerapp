workflows:
  ios-release:
    name: iOS Release Build (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.zerinexpress.app"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.pub-cache
        - ios/Pods

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/ios/debug-info

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/debug-info/**/*

    publishing:
      email:
        recipients:
          - dimanshilla255@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        private_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
